name: Bug Report
description: Report a bug to help improve the local beta
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        **This is a local MVP beta candidate.** Before reporting, please check [KNOWN_LIMITATIONS.md](../docs/KNOWN_LIMITATIONS.md).

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of the app are you running?
      placeholder: "1.34.0-dev"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Run `python --version`
      placeholder: "3.11.0"

  - type: input
    id: node_version
    attributes:
      label: Node.js Version (if relevant)
      description: Run `node --version`
      placeholder: "18.0.0"

  - type: dropdown
    id: setup_path
    attributes:
      label: Setup Method
      options:
        - Docker Compose
        - Local scripts (setup-local.sh)
        - Manual (pip install)
        - Other

  - type: input
    id: command_run
    attributes:
      label: Command Run
      description: What command or action triggered the issue?
      placeholder: "decision-system ask ..."

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Diagnostics
      description: Paste relevant logs or attach diagnostics output. **Redact any API keys or secrets.**
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.

  - type: checkboxes
    id: impact
    attributes:
      label: Issue Impact
      options:
        - label: Affects demo path
        - label: Affects data or document processing
        - label: Potential data loss
        - label: Potential security concern

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
